# Reusable workflow: Pull metadata from App Store Connect and open a PR.
#
# Downloads current metadata from ASC, converts it to the custom
# translator-friendly format, and opens a pull request with the result.
#
# Required repo secrets:
#   APP_STORE_CONNECT_API_KEY_P8
#   APP_STORE_CONNECT_KEY_ID
#   APP_STORE_CONNECT_ISSUER_ID
#
# Required org secrets:
#   CHECKOUT_PAT
#
# Required repo variables:
#   IOS_RELEASE_APP_BUNDLE_ID

name: iOS Metadata Sync (Reusable)

on:
  workflow_call:
    inputs:
      source:
        description: "Which version to fetch from: 'live' (currently released) or 'edit' (editable draft)"
        required: false
        type: string
        default: "live"
      max_attempts:
        description: "Number of poll attempts. If no changes are detected, retry up to this many times."
        required: false
        type: number
        default: 1
      poll_interval_seconds:
        description: "Seconds to wait between poll attempts."
        required: false
        type: number
        default: 60
      ruby_version:
        description: "Ruby version for fastlane"
        required: false
        type: string
        default: "3.2"

concurrency:
  group: ios-metadata-sync-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-metadata:
    name: Sync Metadata from App Store Connect
    runs-on: macos-26
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_BUNDLE_ID: ${{ vars.IOS_RELEASE_APP_BUNDLE_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CHECKOUT_PAT || github.token }}

      - name: Checkout ios-ci tooling
        uses: actions/checkout@v4
        with:
          repository: NovusOrdoApps/ios-ci
          path: _ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: true
          working-directory: _ci

      - name: Write API key
        run: |
          mkdir -p "$RUNNER_TEMP/secrets"
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}" > "$RUNNER_TEMP/secrets/AuthKey.p8"
          echo "ASC_KEY_P8_PATH=$RUNNER_TEMP/secrets/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Validate inputs
        run: |
          : "${APP_BUNDLE_ID:?Missing GitHub Actions variable IOS_RELEASE_APP_BUNDLE_ID}"
          echo ":: App Bundle ID: $APP_BUNDLE_ID"

      - name: Sync metadata (with optional polling)
        id: changes
        env:
          MAX_ATTEMPTS: ${{ inputs.max_attempts }}
          POLL_INTERVAL: ${{ inputs.poll_interval_seconds }}
          SOURCE: ${{ inputs.source }}
        run: |
          attempt=1
          has_changes="false"

          while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
            echo ":: Attempt $attempt/$MAX_ATTEMPTS"

            rm -rf "$RUNNER_TEMP/asc-download"

            (cd _ci && bundle exec fastlane fetch_metadata \
              output_path:"$RUNNER_TEMP/asc-download" \
              source:"$SOURCE")

            if [ -d "metadata/Text" ]; then
              rm -rf metadata/Text
            fi
            ruby _ci/scripts/reverse_transform_metadata.rb \
              --input "$RUNNER_TEMP/asc-download/metadata" \
              --output "metadata/Text"

            if [ -n "$(git status --porcelain metadata/Text/)" ]; then
              has_changes="true"
              echo ":: Changes detected on attempt $attempt"
              break
            fi

            echo ":: No changes detected on attempt $attempt"
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo ":: Sleeping $POLL_INTERVAL seconds before retry..."
              sleep "$POLL_INTERVAL"
            fi
            attempt=$((attempt + 1))
          done

          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"
          if [ "$has_changes" = "true" ]; then
            git add metadata/Text/
          else
            echo ":: No changes after $MAX_ATTEMPTS attempt(s) — repo is already in sync."
          fi

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.CHECKOUT_PAT || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="metadata-sync/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "sync: pull metadata from App Store Connect"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "Sync metadata from App Store Connect" \
            --body "$(cat <<'BODY'
          ## Summary

          Pulled current metadata from App Store Connect and converted to the repo convention.

          - Shared values (identical across all locales) are in `defaults/`
          - Per-locale overrides are in their respective locale folders
          - Only fields that differ from defaults are stored per-locale

          **Review the changes and merge when ready.**
          BODY
          )"

      - name: Cleanup
        if: always()
        run: rm -f "$RUNNER_TEMP/secrets/AuthKey.p8"
