# Reusable workflow: Submit the current editable App Store version for review.
#
# Auto-selects:
#   - The current editable version on App Store Connect
#   - The latest build uploaded to TestFlight
#
# Submits for review with automatic release enabled.
#
# Required repo secrets:
#   APP_STORE_CONNECT_API_KEY_P8
#   APP_STORE_CONNECT_KEY_ID
#   APP_STORE_CONNECT_ISSUER_ID
#
# Required org secrets:
#   CHECKOUT_PAT
#
# Required repo variables:
#   IOS_RELEASE_APP_BUNDLE_ID
#
# Required repo files:
#   metadata/submission.jsonc — answers to Apple's review questions

name: iOS Submit for Review (Reusable)

on:
  workflow_call:
    inputs:
      ruby_version:
        description: "Ruby version for fastlane"
        required: false
        type: string
        default: "3.2"

concurrency:
  group: ios-submit-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  submit:
    name: Submit for App Store Review
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_BUNDLE_ID: ${{ vars.IOS_RELEASE_APP_BUNDLE_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CHECKOUT_PAT || github.token }}

      - name: Checkout ios-ci tooling
        uses: actions/checkout@v4
        with:
          repository: NovusOrdoApps/ios-ci
          path: _ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: true
          working-directory: _ci

      - name: Write API key
        run: |
          mkdir -p "$RUNNER_TEMP/secrets"
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}" > "$RUNNER_TEMP/secrets/AuthKey.p8"
          echo "ASC_KEY_P8_PATH=$RUNNER_TEMP/secrets/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Validate inputs
        run: |
          : "${APP_BUNDLE_ID:?Missing GitHub Actions variable IOS_RELEASE_APP_BUNDLE_ID}"

          if [ ! -f "metadata/submission.jsonc" ]; then
            echo "ERROR: Expected metadata/submission.jsonc with answers to Apple's review questions." >&2
            echo "See ios-ci README for the expected format." >&2
            exit 1
          fi

          echo ":: App Bundle ID: $APP_BUNDLE_ID"

      - name: Submit for review
        working-directory: _ci
        run: |
          bundle exec fastlane submit_for_review \
            submission_info_path:"$GITHUB_WORKSPACE/metadata/submission.jsonc"

      - name: Cleanup
        if: always()
        run: rm -f "$RUNNER_TEMP/secrets/AuthKey.p8"
