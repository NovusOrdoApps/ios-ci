# Reusable workflow: Create or update In-App Purchases on App Store Connect.
#
# Reads the caller repo's metadata/InAppPurchases/ source layout, validates it,
# and pushes consumable + non-consumable products to ASC. Idempotent: re-running
# is safe — products are matched by product_id, created if missing, updated if
# present.
#
# Required repo secrets:
#   APP_STORE_CONNECT_API_KEY_P8
#   APP_STORE_CONNECT_KEY_ID
#   APP_STORE_CONNECT_ISSUER_ID
#
# Required org secrets:
#   CHECKOUT_PAT
#
# Required repo variables:
#   IOS_RELEASE_APP_BUNDLE_ID

name: iOS IAP (Reusable)

on:
  workflow_call:
    inputs:
      ruby_version:
        description: "Ruby version for fastlane"
        required: false
        type: string
        default: "3.2"
      macos_runner:
        description: "macOS runner label"
        required: false
        type: string
        default: "macos-26"

concurrency:
  group: ios-iap-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-iap:
    name: Update In-App Purchases
    runs-on: ${{ inputs.macos_runner }}
    timeout-minutes: 30

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_BUNDLE_ID: ${{ vars.IOS_RELEASE_APP_BUNDLE_ID }}

    steps:
      - name: Checkout app/metadata repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CHECKOUT_PAT || github.token }}

      - name: Checkout ios-ci tooling
        uses: actions/checkout@v4
        with:
          repository: NovusOrdoApps/ios-ci
          path: _ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: true
          working-directory: _ci

      - name: Write API key
        run: |
          mkdir -p "$RUNNER_TEMP/secrets"
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}" > "$RUNNER_TEMP/secrets/AuthKey.p8"
          echo "ASC_KEY_P8_PATH=$RUNNER_TEMP/secrets/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Validate inputs
        run: |
          : "${APP_BUNDLE_ID:?Missing GitHub Actions variable IOS_RELEASE_APP_BUNDLE_ID}"

          if [ ! -d "metadata/InAppPurchases" ]; then
            echo "ERROR: Expected metadata/InAppPurchases/ directory at the repo root." >&2
            echo "See ios-ci README for the expected IAP source layout." >&2
            exit 1
          fi

          echo ":: App Bundle ID: $APP_BUNDLE_ID"

      - name: Transform IAP source
        run: |
          ruby _ci/scripts/transform_iap.rb \
            --input "$GITHUB_WORKSPACE/metadata/InAppPurchases" \
            --output "$RUNNER_TEMP/iap-normalized.json"

      - name: Push IAPs to App Store Connect
        working-directory: _ci
        run: |
          bundle exec fastlane update_iap \
            input_path:"$RUNNER_TEMP/iap-normalized.json"

      - name: Cleanup
        if: always()
        run: rm -f "$RUNNER_TEMP/secrets/AuthKey.p8"
